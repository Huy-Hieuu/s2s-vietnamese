model:
  name: "FunAudioLLM/CosyVoice2-0.5B"
  sample_rate: 24000
  n_mel_channels: 80
  hop_length: 256
  win_length: 1024
  torch_dtype: "bfloat16"

training:
  output_dir: "checkpoints/tts/cosyvoice2-vi"
  num_train_epochs: 10
  per_device_train_batch_size: 8
  gradient_accumulation_steps: 4
  learning_rate: 1.0e-4
  warmup_steps: 1000
  weight_decay: 0.01
  bf16: true
  gradient_checkpointing: true
  eval_strategy: "steps"
  eval_steps: 500
  save_steps: 500
  save_total_limit: 5
  logging_steps: 50
  report_to: "wandb"

data:
  train_files:
    - "data/tts/train/vietnamese_speech.jsonl"
  eval_files:
    - "data/tts/eval/vietnamese_speech_eval.jsonl"
  min_audio_length_s: 1.0
  max_audio_length_s: 15.0
  sample_rate: 24000

voice_cloning:
  enabled: true
  reference_audio_dir: "data/tts/reference_speakers"
  min_reference_duration_s: 3.0
  max_speakers: 100

streaming:
  chunk_size_tokens: 50
  overlap_tokens: 5
