model:
  name: "meta-llama/Meta-Llama-3-8B-Instruct"
  max_model_len: 4096
  torch_dtype: "bfloat16"
  use_flash_attention_2: true

training:
  output_dir: "checkpoints/llm/sft"
  num_train_epochs: 3
  per_device_train_batch_size: 4
  gradient_accumulation_steps: 4
  learning_rate: 2.0e-5
  warmup_ratio: 0.1
  weight_decay: 0.01
  bf16: true
  gradient_checkpointing: true
  eval_strategy: "steps"
  eval_steps: 200
  save_steps: 200
  save_total_limit: 3
  logging_steps: 25
  report_to: "wandb"

data:
  train_files:
    - "data/llm/sft/vietnamese_conversations.jsonl"
  eval_files:
    - "data/llm/sft/eval_conversations.jsonl"
  max_seq_length: 4096
  chat_template: "llama-3"

serving:
  engine: "vllm"
  tensor_parallel_size: 1
  gpu_memory_utilization: 0.85
  max_num_seqs: 64
  max_num_batched_tokens: 8192
  enable_prefix_caching: true
